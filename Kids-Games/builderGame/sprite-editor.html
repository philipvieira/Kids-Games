<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sprite Region Editor — blocks.png</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background:#1a1a2e; color:#eee; display:flex; height:100vh; overflow:hidden; }

#sidebar {
  width: 340px; min-width:300px; background:#16213e; overflow-y:auto; padding:12px;
  border-right: 2px solid #0f3460;
}
#sidebar h2 { text-align:center; margin-bottom:10px; color:#e94560; font-size:1.1rem; }

.sprite-item {
  background:#0f3460; border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer;
  border: 2px solid transparent; transition: border-color 0.2s;
}
.sprite-item.selected { border-color:#e94560; }
.sprite-item .name { font-weight:700; font-size:0.9rem; }
.sprite-item .coords { font-size:0.75rem; color:#aaa; margin-top:2px; }
.sprite-item .preview-thumb { margin-top:4px; background: repeating-conic-gradient(#333 0% 25%, #555 0% 50%) 50% / 10px 10px; }
.sprite-item .preview-thumb canvas { display:block; max-height:50px; }

.variant-label { font-size:0.7rem; color:#888; margin-left:6px; }

#edit-panel {
  display:none; background:#1a1a3e; border-radius:8px; padding:12px; margin-top:10px;
  border:1px solid #e94560;
}
#edit-panel h3 { font-size:0.95rem; color:#e94560; margin-bottom:8px; }
.field-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.field-row label { width:30px; font-size:0.8rem; text-align:right; }
.field-row input { width:70px; background:#0f3460; border:1px solid #555; color:#eee; padding:3px 5px; border-radius:4px; font-size:0.85rem; }
.field-row .arrow { background:#e94560; color:#fff; border:none; width:22px; height:22px; border-radius:4px; cursor:pointer; font-size:0.9rem; }
.field-row .arrow:hover { background:#ff6b81; }

#preview-box {
  margin-top:10px; text-align:center;
  background: repeating-conic-gradient(#333 0% 25%, #555 0% 50%) 50% / 12px 12px;
  border-radius:6px; padding:8px; min-height:60px;
}
#preview-box canvas { max-width:100%; }

#btn-copy {
  margin-top:10px; width:100%; padding:10px; background:#e94560; color:#fff; border:none;
  border-radius:6px; font-size:0.9rem; font-weight:700; cursor:pointer;
}
#btn-copy:hover { background:#ff6b81; }

#canvas-area { flex:1; overflow:auto; position:relative; background:#111; }
#canvas-area canvas { cursor:crosshair; display:block; }

#zoom-bar {
  position:fixed; bottom:12px; right:12px; background:#16213e; padding:6px 12px;
  border-radius:8px; display:flex; align-items:center; gap:8px; z-index:10;
}
#zoom-bar button { background:#e94560; border:none; color:#fff; width:28px; height:28px; border-radius:4px; cursor:pointer; font-size:1.1rem; }
#zoom-bar span { font-size:0.85rem; }

.sep { height:1px; background:#333; margin:10px 0; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Sprite Region Editor</h2>
  <p style="font-size:0.75rem;color:#888;margin-bottom:8px;text-align:center">Click a sprite to select it. Drag on canvas to reposition. Use arrows or inputs to fine-tune.</p>
  <div id="sprite-list"></div>
  <div class="sep"></div>
  <div id="edit-panel">
    <h3 id="edit-title">Editing: —</h3>
    <div class="field-row"><label>sx:</label><button class="arrow" onclick="nudge('sx',-1)">◀</button><input id="f-sx" type="number"/><button class="arrow" onclick="nudge('sx',1)">▶</button></div>
    <div class="field-row"><label>sy:</label><button class="arrow" onclick="nudge('sy',-1)">▲</button><input id="f-sy" type="number"/><button class="arrow" onclick="nudge('sy',1)">▼</button></div>
    <div class="field-row"><label>sw:</label><button class="arrow" onclick="nudge('sw',-1)">−</button><input id="f-sw" type="number"/><button class="arrow" onclick="nudge('sw',1)">+</button></div>
    <div class="field-row"><label>sh:</label><button class="arrow" onclick="nudge('sh',-1)">−</button><input id="f-sh" type="number"/><button class="arrow" onclick="nudge('sh',1)">+</button></div>
    <div id="preview-box"><canvas id="preview-cv"></canvas></div>
  </div>
  <div class="sep"></div>
  <button id="btn-copy" onclick="copyOutput()">📋 Copy Updated Code to Clipboard</button>
  <pre id="output" style="font-size:0.65rem;color:#aaa;margin-top:8px;max-height:300px;overflow:auto;white-space:pre-wrap;"></pre>
</div>

<div id="canvas-area">
  <canvas id="main-cv"></canvas>
</div>

<div id="zoom-bar">
  <button onclick="changeZoom(-0.25)">−</button>
  <span id="zoom-label">1.5x</span>
  <button onclick="changeZoom(0.25)">+</button>
</div>

<script>
'use strict';

const SPRITES = {
  square: [
    { sx: 180, sy: 38, sw: 93, sh: 85 },
    { sx: 283, sy: 38, sw: 96, sh: 85 },
    { sx: 390, sy: 38, sw: 97, sh: 84 },
    { sx: 498, sy: 38, sw: 98, sh: 85 },
    { sx: 607, sy: 37, sw: 99, sh: 86 },
  ],
  rect: [
    { sx: 177, sy: 145, sw: 136, sh: 51 },
    { sx: 322, sy: 145, sw: 140, sh: 52 },
    { sx: 473, sy: 145, sw: 154, sh: 51 },
    { sx: 639, sy: 145, sw: 159, sh: 52 },
  ],
  triangle: [{ sx: 176, sy: 216, sw: 105, sh: 75 }],
  arch:     [{ sx: 298, sy: 221, sw: 135, sh: 71 }],
  circle:   [{ sx: 457, sy: 216, sw: 94,  sh: 90 }],
  plank: [
    { sx: 580, sy: 240, sw: 254, sh: 41 },
    { sx: 579, sy: 286, sw: 218, sh: 29 },
  ],
  heavy:    [{ sx: 607, sy: 37, sw: 99, sh: 86 }],
  rainbow:  [{ sx: 169, sy: 328, sw: 121, sh: 89 }],
  bouncy:   [{ sx: 302, sy: 315, sw: 91,  sh: 117 }],
  sticky:   [{ sx: 407, sy: 320, sw: 108, sh: 97 }],
  star:     [{ sx: 518, sy: 308, sw: 114, sh: 109 }],
};

const PU_SPRITES = {
  slowtime:  { sx: 628, sy: 308, sw: 94,  sh: 115 },
  undo:      { sx: 718, sy: 308, sw: 112, sh: 115 },
  giant:     { sx: 826, sy: 334, sw: 87,  sh: 89  },
  stabilize: { sx: 518, sy: 308, sw: 114, sh: 109 },
};

const COLORS = {
  square: 'rgba(255,200,50,0.5)', rect: 'rgba(255,130,50,0.5)',
  triangle: 'rgba(50,200,80,0.5)', arch: 'rgba(80,150,255,0.5)',
  circle: 'rgba(255,220,80,0.5)', plank: 'rgba(170,120,255,0.5)',
  heavy: 'rgba(160,160,180,0.5)', rainbow: 'rgba(255,50,200,0.5)',
  bouncy: 'rgba(255,100,180,0.5)', sticky: 'rgba(100,240,160,0.5)',
  star: 'rgba(255,230,100,0.5)',
  slowtime: 'rgba(200,200,50,0.5)', undo: 'rgba(50,200,200,0.5)',
  giant: 'rgba(200,100,200,0.5)', stabilize: 'rgba(100,200,100,0.5)',
};

const BORDER_COLORS = {
  square: '#ffd000', rect: '#ff8800', triangle: '#00cc44', arch: '#4488ff',
  circle: '#ffcc00', plank: '#9966ff', heavy: '#aaaacc', rainbow: '#ff33cc',
  bouncy: '#ff66aa', sticky: '#44ee88', star: '#ffee44',
  slowtime: '#cccc00', undo: '#00cccc', giant: '#cc66cc', stabilize: '#66cc66',
};

let img = null;
let zoom = 1.5;
let selected = null;  // { group:'square'|'pu_slowtime', idx:0 }
let dragging = false;
let dragStart = null;

function allEntries() {
  const out = [];
  for (const [name, arr] of Object.entries(SPRITES)) {
    arr.forEach((sp, i) => out.push({ group: name, idx: i, sp, isPU: false }));
  }
  for (const [name, sp] of Object.entries(PU_SPRITES)) {
    out.push({ group: 'pu_' + name, idx: 0, sp, isPU: true });
  }
  return out;
}

function getSelected() {
  if (!selected) return null;
  if (selected.group.startsWith('pu_')) {
    const name = selected.group.slice(3);
    return PU_SPRITES[name];
  }
  return SPRITES[selected.group][selected.idx];
}

function buildSidebar() {
  const list = document.getElementById('sprite-list');
  list.innerHTML = '';

  function addItem(label, group, idx, sp) {
    const div = document.createElement('div');
    div.className = 'sprite-item';
    div.dataset.group = group;
    div.dataset.idx = idx;
    div.innerHTML = `<span class="name">${label}</span>` +
      (idx > 0 ? `<span class="variant-label">[variant ${idx}]</span>` : '') +
      `<div class="coords">${sp.sx}, ${sp.sy}, ${sp.sw}×${sp.sh}</div>` +
      `<div class="preview-thumb"><canvas width="1" height="1"></canvas></div>`;
    div.addEventListener('click', () => selectSprite(group, idx));
    list.appendChild(div);
    updateThumb(div, sp);
  }

  for (const [name, arr] of Object.entries(SPRITES)) {
    arr.forEach((sp, i) => addItem(name, name, i, sp));
  }
  const sep = document.createElement('div');
  sep.className = 'sep';
  sep.innerHTML = '<span style="font-size:0.75rem;color:#888">Power-ups</span>';
  list.appendChild(sep);
  for (const [name, sp] of Object.entries(PU_SPRITES)) {
    addItem('PU: ' + name, 'pu_' + name, 0, sp);
  }
}

function updateThumb(div, sp) {
  if (!img) return;
  const cv = div.querySelector('.preview-thumb canvas');
  const scale = Math.min(120 / sp.sw, 50 / sp.sh, 2);
  cv.width = Math.round(sp.sw * scale);
  cv.height = Math.round(sp.sh * scale);
  const cx = cv.getContext('2d');
  cx.clearRect(0, 0, cv.width, cv.height);
  cx.drawImage(img, sp.sx, sp.sy, sp.sw, sp.sh, 0, 0, cv.width, cv.height);
}

function selectSprite(group, idx) {
  selected = { group, idx };
  document.querySelectorAll('.sprite-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.group === group && +el.dataset.idx === idx);
  });
  const sp = getSelected();
  if (!sp) return;
  document.getElementById('edit-panel').style.display = '';
  document.getElementById('edit-title').textContent = 'Editing: ' + group + (idx > 0 ? ` [${idx}]` : '');
  document.getElementById('f-sx').value = sp.sx;
  document.getElementById('f-sy').value = sp.sy;
  document.getElementById('f-sw').value = sp.sw;
  document.getElementById('f-sh').value = sp.sh;
  updatePreview();
  drawCanvas();
}

function updatePreview() {
  const sp = getSelected();
  if (!sp || !img) return;
  const cv = document.getElementById('preview-cv');
  const scale = Math.min(200 / sp.sw, 120 / sp.sh, 3);
  cv.width = Math.round(sp.sw * scale);
  cv.height = Math.round(sp.sh * scale);
  const cx = cv.getContext('2d');
  cx.clearRect(0, 0, cv.width, cv.height);
  cx.drawImage(img, sp.sx, sp.sy, sp.sw, sp.sh, 0, 0, cv.width, cv.height);
}

function nudge(field, delta) {
  const sp = getSelected();
  if (!sp) return;
  sp[field] = Math.max(0, sp[field] + delta);
  document.getElementById('f-' + field).value = sp[field];
  refreshAfterEdit();
}

['sx','sy','sw','sh'].forEach(f => {
  document.getElementById('f-' + f).addEventListener('input', function() {
    const sp = getSelected();
    if (!sp) return;
    sp[f] = Math.max(0, parseInt(this.value) || 0);
    refreshAfterEdit();
  });
});

function refreshAfterEdit() {
  updatePreview();
  drawCanvas();
  const sp = getSelected();
  if (!sp || !selected) return;
  const item = document.querySelector(`.sprite-item[data-group="${selected.group}"][data-idx="${selected.idx}"]`);
  if (item) {
    item.querySelector('.coords').textContent = `${sp.sx}, ${sp.sy}, ${sp.sw}×${sp.sh}`;
    updateThumb(item, sp);
  }
  updateOutput();
}

function drawCanvas() {
  const cv = document.getElementById('main-cv');
  if (!img) return;
  cv.width = Math.round(img.naturalWidth * zoom);
  cv.height = Math.round(img.naturalHeight * zoom);
  const cx = cv.getContext('2d');
  cx.imageSmoothingEnabled = false;
  cx.drawImage(img, 0, 0, cv.width, cv.height);

  const entries = allEntries();
  entries.forEach(e => {
    const isSel = selected && selected.group === e.group && selected.idx === e.idx;
    const sp = e.sp;
    const x = sp.sx * zoom, y = sp.sy * zoom, w = sp.sw * zoom, h = sp.sh * zoom;
    const name = e.group.replace('pu_', 'PU:');

    cx.fillStyle = isSel ? 'rgba(233,69,96,0.25)' : (COLORS[e.group.replace('pu_','')] || 'rgba(255,255,255,0.15)');
    cx.fillRect(x, y, w, h);
    cx.strokeStyle = isSel ? '#e94560' : (BORDER_COLORS[e.group.replace('pu_','')] || '#fff');
    cx.lineWidth = isSel ? 3 : 1;
    cx.setLineDash(isSel ? [] : [4, 3]);
    cx.strokeRect(x, y, w, h);
    cx.setLineDash([]);

    if (isSel) {
      // Resize handle
      cx.fillStyle = '#e94560';
      cx.fillRect(x + w - 6, y + h - 6, 8, 8);
    }

    cx.fillStyle = '#fff';
    cx.font = `${Math.max(10, 11 * zoom)}px system-ui`;
    cx.fillText(name + (e.idx > 0 ? `[${e.idx}]` : ''), x + 2, y - 3);
  });
}

function changeZoom(delta) {
  zoom = Math.max(0.5, Math.min(5, zoom + delta));
  document.getElementById('zoom-label').textContent = zoom.toFixed(2) + 'x';
  drawCanvas();
}

// --- Drag to reposition ---
const cvArea = document.getElementById('canvas-area');
const mainCv = document.getElementById('main-cv');

mainCv.addEventListener('mousedown', function(e) {
  if (!selected) return;
  const sp = getSelected();
  if (!sp) return;
  const rect = mainCv.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / zoom;
  const my = (e.clientY - rect.top) / zoom;

  // Check if near resize handle (bottom-right corner)
  const hx = sp.sx + sp.sw;
  const hy = sp.sy + sp.sh;
  if (Math.abs(mx - hx) < 8 && Math.abs(my - hy) < 8) {
    dragging = 'resize';
    dragStart = { mx, my, osx: sp.sx, osy: sp.sy, osw: sp.sw, osh: sp.sh };
    return;
  }

  // Check if inside selected rect
  if (mx >= sp.sx && mx <= sp.sx + sp.sw && my >= sp.sy && my <= sp.sy + sp.sh) {
    dragging = 'move';
    dragStart = { mx, my, osx: sp.sx, osy: sp.sy };
  }
});

window.addEventListener('mousemove', function(e) {
  if (!dragging || !dragStart) return;
  const sp = getSelected();
  if (!sp) return;
  const rect = mainCv.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / zoom;
  const my = (e.clientY - rect.top) / zoom;

  if (dragging === 'move') {
    sp.sx = Math.round(Math.max(0, dragStart.osx + (mx - dragStart.mx)));
    sp.sy = Math.round(Math.max(0, dragStart.osy + (my - dragStart.my)));
  } else if (dragging === 'resize') {
    sp.sw = Math.round(Math.max(10, dragStart.osw + (mx - dragStart.mx)));
    sp.sh = Math.round(Math.max(10, dragStart.osh + (my - dragStart.my)));
  }

  document.getElementById('f-sx').value = sp.sx;
  document.getElementById('f-sy').value = sp.sy;
  document.getElementById('f-sw').value = sp.sw;
  document.getElementById('f-sh').value = sp.sh;
  refreshAfterEdit();
});

window.addEventListener('mouseup', function() {
  dragging = false;
  dragStart = null;
});

// --- Generate output ---
function updateOutput() {
  document.getElementById('output').textContent = generateCode();
}

function generateCode() {
  let out = 'const BLOCK_SPRITES = {\n';
  for (const [name, arr] of Object.entries(SPRITES)) {
    out += `  ${name}: [\n`;
    arr.forEach(sp => {
      out += `    { sx: ${sp.sx}, sy: ${sp.sy}, sw: ${sp.sw}, sh: ${sp.sh} },\n`;
    });
    out += '  ],\n';
  }
  out += '};\n\nconst PU_SPRITES = {\n';
  for (const [name, sp] of Object.entries(PU_SPRITES)) {
    out += `  ${name}: { sx: ${sp.sx}, sy: ${sp.sy}, sw: ${sp.sw}, sh: ${sp.sh} },\n`;
  }
  out += '};\n';
  return out;
}

function copyOutput() {
  const text = generateCode();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy Updated Code to Clipboard'; }, 2000);
  });
}

// --- Load image ---
img = new Image();
img.onload = function() {
  buildSidebar();
  drawCanvas();
  updateOutput();
};
img.src = 'blocks.png';
</script>
</body>
</html>
