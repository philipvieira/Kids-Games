<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחקי ילדים</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

  <!-- Fixed background layer — iOS Safari safe (position:fixed real DOM element) -->
  <div id="bg"></div>

  <div class="page">

    <!-- Splash overlay — dismissed on first tap, unlocks audio -->
    <div class="splash-overlay" id="splash">
      <div class="splash-content">
        <img src="assets/logo.png" class="splash-logo" alt="משחקי ילדים" />
        <p>לחץ להתחיל</p>
      </div>
    </div>

    <header class="site-header">
      <img src="assets/logo.png" class="header-logo" alt="משחקי ילדים" />
      <p class="subtitle">בחר משחק והתחל לשחק!</p>
    </header>

    <main class="games-grid" id="games-grid">
      <!-- Cards are injected by JavaScript from games.js -->
    </main>

    <footer class="site-footer">
      <p>עוד משחקים בקרוב...</p>
    </footer>

  </div>

  <script src="games.js"></script>
  <script>
    // ── Music ──────────────────────────────────────────
    const menuMusic = new Audio('assets/intro.mp3');
    menuMusic.loop   = true;
    menuMusic.volume = 0.45;

    // ── Splash overlay — forces a user gesture to unlock audio ──
    const splash = document.getElementById('splash');
    splash.addEventListener('click', () => {
      menuMusic.play().catch(() => {});
      splash.classList.add('hidden');
      splash.addEventListener('transitionend', () => splash.remove(), { once: true });
    }, { once: true });

    // ── Game cards ─────────────────────────────────────
    const grid = document.getElementById('games-grid');

    if (!GAMES || GAMES.length === 0) {
      grid.innerHTML = '<p class="empty-msg">אין משחקים זמינים כרגע.</p>';
    } else {
      GAMES.forEach(game => {
        const card = document.createElement('a');
        card.href      = game.path;
        card.className = 'game-card';
        card.innerHTML = `
          <div class="card-thumb ${game.btnColor || ''}">
            ${game.thumb
              ? `<img class="card-screenshot" src="${game.thumb}" alt="${game.title}"/>`
              : `<div class="card-icon">${game.icon}</div>`
            }
          </div>
          <div class="card-label">
            <span class="card-title">${game.title}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }
  </script>

</body>
</html>
