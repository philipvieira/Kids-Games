<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחקי ילדים</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">

    <!-- Splash overlay — dismissed on first tap, unlocks audio -->
    <div class="splash-overlay" id="splash">
      <div class="splash-content">
        <div class="splash-icon">🎮</div>
        <h2>משחקי ילדים</h2>
        <p>לחץ להתחיל</p>
      </div>
    </div>

    <header class="site-header">
      <h1>🎮 משחקי ילדים 🎮</h1>
      <p class="subtitle">בחר משחק והתחל לשחק!</p>
    </header>

    <main class="games-grid" id="games-grid">
      <!-- Cards are injected by JavaScript from games.js -->
    </main>

    <footer class="site-footer">
      <p>עוד משחקים בקרוב...</p>
    </footer>

  </div>

  <script src="games.js"></script>
  <script>
    // ── Music ──────────────────────────────────────────
    const menuMusic = new Audio('intro.mp3');
    menuMusic.loop   = true;
    menuMusic.volume = 0.55;

    // ── Splash overlay — forces a user gesture to unlock audio ──
    const splash = document.getElementById('splash');
    splash.addEventListener('click', () => {
      menuMusic.play().catch(() => {});
      splash.classList.add('hidden');
      splash.addEventListener('transitionend', () => splash.remove(), { once: true });
    }, { once: true });

    // ── Game cards ─────────────────────────────────────
    const grid = document.getElementById('games-grid');

    if (!GAMES || GAMES.length === 0) {
      grid.innerHTML = '<p class="empty-msg">אין משחקים זמינים כרגע.</p>';
    } else {
      GAMES.forEach(game => {
        const card = document.createElement('a');
        card.href      = game.path;
        card.className = 'game-card';
        card.style.background = game.color;
        card.innerHTML = `
          <div class="card-icon">${game.icon}</div>
          <div class="card-body">
            <h2 class="card-title">${game.title}</h2>
            <p class="card-desc">${game.desc}</p>
          </div>
          <div class="card-arrow">◄</div>
        `;
        grid.appendChild(card);
      });
    }
  </script>

</body>
</html>
